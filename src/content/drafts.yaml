- id: cpb-327
  category: commonplace
  text: The Judean province of the Roman Empire was built piecemeal in the first
    half of the first century AD. Greater Palestine was a patchwork of petty
    suzerainties, which the Romans were content to acquire patiently. The Romans
    profited from the iron-fisted rule of Herod the Great and were pleased to
    leave him in power as a loyal client. Only some 10 years after his death did
    the emperor Augustus annex Judea, the heartland of ancient Judaism. From 6
    AD on, it was governed directly by Roman administrators, such as Pontius
    Pilate. Galilee, in the North, was left in the hands of Herod's sons long
    after the Romans had taken direct control of Judea. The hills of Galilee
    were too remote and too poor to matter, and the region was finally and
    unceremoniously incorporated into the empire during the reign of Claudius,
    in AD 44 ...
    https://lareviewofbooks.org/article/the-emperor-and-the-empty-tomb-an-ancient-inscription-an-eccentric-scholar-and-the-human-need-to-touch-the-past/
  note: https://lareviewofbooks.org/article/the-emperor-and-the-empty-tomb-an-ancient-inscription-an-eccentric-scholar-and-the-human-need-to-touch-the-past/
