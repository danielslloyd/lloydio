# Beautiful things — a visual gallery. One consolidated file (edit/reorder in one
# place); each entry needs a unique `id`. Images are hotlinked live from their
# source CDN (never self-hosted, same policy as book covers), with a text-link
# fallback if the image ever 404s. See docs/BEAUTIFUL-IMAGES.md.
#
#   image  — the URL actually rendered as <img>
#   source — the page (or full-res image) the figure links out to
#   width/height — the image's pixel dimensions, to reserve space (no layout shift)

